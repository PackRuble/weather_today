name: weather_today
version: 3.6.0
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-weather_today: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: org.bar.weather_today # adjust accordingly to your app name

apps:
  weather_today:
    command: weather_today
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
    - network
    slots:
      - dbus-weather_today
parts:
  weather_today:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart # The main entry-point file of the application
